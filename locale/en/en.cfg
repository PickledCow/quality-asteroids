[mod-setting-description]
quality-asteroids-default-quality=Used as a fallback if Use per-planet quality factors is False or on unsupported modded planets.
quality-asteroids-per-planet-quality=If set to True, uses the values below for quality factors.\nThis feature has limited functionality during runtime on game versions <2.0.34 and will only use the previous location's quality factor.\nOn versions <2.0.25 this option only fully works while parked at the planet. 
quality-asteroids-use-modded-quality=May be unfairly difficult with tiers too far above Legendary.  Use at your own risk!
